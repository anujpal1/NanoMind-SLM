dataset:
  id: "codeparrot/codeparrot-clean"
  split: "train"
  text_field: "content"
  streaming: true

audit:
  sample_limit: 1000

license_policy:
  allow:
    - "apache-2.0"
    - "mit"
    - "bsd-2-clause"
    - "bsd-3-clause"
  reject_unknown: true

filtering:
  min_characters: 100
  max_characters: 100000
  max_line_length: 1000
  allow_autogenerated: false

required_fields:
  - repo_name
  - path
  - size
  - content
  - license
  - hash
  - line_mean
  - line_max
  - alpha_frac
  - autogenerated