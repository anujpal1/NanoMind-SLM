dataset:
  id: "codeparrot/codeparrot-clean"
  revision: "PASTE_THE_40_CHARACTER_REVISION_HERE"
  split: "train"
  text_field: "content"
  streaming: true

audit:
  sample_limit: 1000

license_policy:
  allow:
    - "apache-2.0"
    - "mit"
    - "bsd-2-clause"
    - "bsd-3-clause"
  reject_unknown: true

filtering:
  min_characters: 100
  max_characters: 100000
  max_line_length: 1000
  allow_autogenerated: false

required_fields:
  - repo_name
  - path
  - size
  - content
  - license
  - hash
  - line_mean
  - line_max
  - alpha_frac
  - autogenerated

sampling:
  seed: 42
  scan_limit: 10000
  validation_fraction: 0.10
  split_unit: "repository"
  identity_field: "hash"
  priority_algorithm: "sha256"
  deduplicate_by: "hash"

  train_limits:
    max_records: 5000
    max_characters: 10000000

  validation_limits:
    max_records: 500
    max_characters: 1000000

  experiments:
    - "baseline"
    - "quality"